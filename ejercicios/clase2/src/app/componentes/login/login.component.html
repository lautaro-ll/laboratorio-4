<div class="container">
  <div class="row justify-content-center">
    <div class="col-4 mt-2">
        <div class="card">
          <div class="card-body">
            <div class="mb-3">
              <label for="iNombre" class="form-label">Nombre</label>
              <input type="username" class="form-control" id="iNombre" placeholder="su nombre" [(ngModel)]="usuario.nombre">
            </div>
            <div class="mb-3">
              <label for="inClave" class="form-label">Clave</label>
              <input type="password" class="form-control" id="inClave" placeholder="clave" [(ngModel)]="usuario.clave">
            </div>
            <button type="button" class="btn btn-primary btn-block w-100" (click)="login()">Login</button>
            <small class="text-danger">{{error}}</small>
          </div>
        </div>
    </div>
  </div>
</div>
